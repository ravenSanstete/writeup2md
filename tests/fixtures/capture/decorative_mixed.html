<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Decorative and Content Mix</title>
</head>
<body>
<article>
  <h1>Decorative and Content Mix</h1>
  <p>An emoji icon <img class="emoji" src="https://example.com/emoji/smile.png"
     alt="smile" width="16" height="16"> inline.</p>
  <p>An avatar <img class="avatar" src="https://example.com/u/admin.png"
     alt="User avatar" width="24" height="24">.</p>
  <p>A real content image: <img class="content"
     src="https://example.com/screenshots/payload.png"
     alt="Screenshot of the Burp Suite repeater tab"
     width="800" height="400"></p>
  <p>A logo (decorative): <img class="logo" src="https://example.com/logo.png"
     alt="Site logo" width="120" height="40"></p>
  <p>End.</p>
</article>
</body>
</html>
